<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>ConsulAI Engine</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ConsulAI Engine" />
    <meta property="og:description" content="Simulação Migratória & Auditoria Antifraude Consular" />
    <meta property="og:image" content="/logo.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ConsulAI Engine" />
    <meta name="twitter:description" content="Simulação Migratória & Auditoria Antifraude Consular" />
    <meta name="twitter:image" content="/logo.png" />
    <script>
      try {
        const user = localStorage.getItem("consulai_user");
        if (!user) {
          document.documentElement.classList.add("dark");
          document.documentElement.classList.remove("light");
        } else {
          const theme = localStorage.getItem("consul_ai_theme");
          if (theme === "light") {
            document.documentElement.classList.add("light");
            document.documentElement.classList.remove("dark");
          } else {
            document.documentElement.classList.add("dark");
            document.documentElement.classList.remove("light");
          }
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
