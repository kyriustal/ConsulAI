name: ConsulAI CI Deploy to Hostinger

on:
  push:
    branches: [ "main", "master" ]

jobs:
  deploy:
    name: Build & Deploy to Hostinger
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install all dependencies
        run: npm ci || npm install

      - name: 🛠️ Build fullstack application (Vite + Esbuild full bundle)
        run: npm run build
        env:
          NODE_ENV: production
          GEMINI_API_KEY: "CI_BUILD_PLACEHOLDER"

      - name: ✅ Verify built artifacts
        run: |
          echo "==== Built Artifacts ===="
          ls -la dist/
          if [ -f "dist/server.cjs" ]; then
            echo "✅ dist/server.cjs OK"
          else
            echo "❌ dist/server.cjs NOT FOUND"
            exit 1
          fi
          if [ -f "dist/index.html" ]; then
            echo "✅ dist/index.html OK"
          else
            echo "❌ dist/index.html NOT FOUND"
            exit 1
          fi

      - name: 📁 Prepare deployment package
        run: |
          mkdir -p deploy_dist
          cp -r dist deploy_dist/dist
          cp package.json deploy_dist/
          cp server.js deploy_dist/
          echo "==== Files to deploy ===="
          ls -la deploy_dist/
          ls -la deploy_dist/dist/

      - name: 📂 Sync files to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy_dist/
          server-dir: ./
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
